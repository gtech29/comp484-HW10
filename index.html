<!DOCTYPE html>
<html>

<head>
  <title>Juan Rodriguez | Project 2</title>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <script src="script.js" defer></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <div class="navbar">
      <div class="nav-item">Welcome to Juan's GigaPet</div>
      
    </div>
  </header>

  <main class="page-wrapper">
    <div class="device-wrapper">
      

      <!-- screen -->
      <section class="screen">
        <img class="pet-image" src="./images/zorp-normal.png">
        <span class="pet-name"></span>
        <span class="pet-subtitle">ALIEN PET</span>
        <div class="speech-bubble"></div>
      </section>

      <!-- stats -->
      <section class="stats-panel">
        <!-- happiness and weight are required pet_info keys per project spec -->
        <div class="stat-row">
          <span class="stat-label">HAPPY</span>
          <div class="stat-bar-bg">
            <div class="stat-bar-fill happiness-fill"></div>
          </div>
          <span class="stat-value happiness-val">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">WEIGHT</span>
          <div class="stat-bar-bg">
            <div class="stat-bar-fill weight-fill"></div>
          </div>
          <span class="stat-value weight-val">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">HUNGER</span>
          <div class="stat-bar-bg">
            <div class="stat-bar-fill hunger-fill"></div>
          </div>
          <span class="stat-value hunger-val">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">ENERGY</span>
          <div class="stat-bar-bg">
            <div class="stat-bar-fill energy-fill"></div>
          </div>
          <span class="stat-value energy-val">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">AGE</span>
          <span class="stat-value age-val">0</span>
        </div>
      </section>

      <!-- buttons -->
      <section class="button-container">
        <button class="feed-button">FEED</button>
        <button class="play-button">PLAY</button>
        <button class="exercise-button">EXERCISE</button>
        <button class="sleep-button">SLEEP</button>
      </section>

      <!-- decorative dots -->
      <div class="device-dots">
        <span></span>
        <span class="active"></span>
        <span class="active"></span>
        <span></span>
        <span></span>
      </div>

    </div>

    <section class="devtools-panel" aria-labelledby="devtools-heading">
      <div class="devtools-copy">
        <span class="devtools-kicker">HW10</span>
        <h2 id="devtools-heading">DevTools Debugging</h2>
        <p>Open Chrome DevTools on this GigaPet page to inspect console messages, network errors, and breakpoints in script.js.</p>
      </div>

      <div class="devtools-actions" aria-label="Chrome DevTools console examples">
        <button type="button" id="logInfo">Log Info</button>
        <button type="button" id="logWarning">Log Warning</button>
        <button type="button" id="logError">Log Error</button>
        <button type="button" id="logTable">Log Table</button>
        <button type="button" id="logGroup">Log Group</button>
        <button type="button" id="logCustom">Log Custom</button>
        <button type="button" id="cause404">Cause 404</button>
        <button type="button" id="causeTypeError">Cause TypeError</button>
        <button type="button" id="causeViolation">Cause Violation</button>
      </div>

      <div class="snack-debugger" aria-labelledby="snack-debugger-heading">
        <h3 id="snack-debugger-heading">Snack Calculator</h3>
        <div class="snack-fields">
          <div class="snack-field">
            <label for="snack1">First Snack</label>
            <input type="number" id="snack1" name="snack1" value="2">
          </div>
          <div class="snack-field">
            <label for="snack2">Second Snack</label>
            <input type="number" id="snack2" name="snack2" value="3">
          </div>
        </div>
        <button type="button" id="calculateSnacks">Calculate Snacks</button>
        <output id="snackResult" name="snackResult" for="snack1 snack2">Zorp has ? snacks</output>
      </div>
    </section>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>

</body>

</html>
